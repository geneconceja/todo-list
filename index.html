<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h2>My To Do List</h2>
    </header>

    <div class="content">

      <div>
        <input type="text" id="input-task">
        <button type="button" id="add-task-btn" onclick="addTask()">Add</button>
      </div>

      <div id="tasks">
      </div>

      <div id="delete-completed-div">
        <div id="delete-completed-btns">
          <button id="delete-completed-tasks" type="button">Delete Completed</button>
          <button id="cancel-delete-completed" type="button">Cancel</button>
          <button id="confirm-delete-completed" type="button">Confirm</button>
        </div>
      </div>
      
    </div>
  </main>
  
</body>
</html>

<script src="index.js"></script>
